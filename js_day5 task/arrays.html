<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array tasks</title>
</head>
<body>
    <script>
    // Task 1 : Movies 
   const movies = [
  { id: 1, title: "Bahubali", rating: 9 },
  { id: 2, title: "Pushpa", rating: 8 },
  { id: 3, title: "RRR", rating: 10 },
  { id: 4, title: "Salaar", rating: 7 }
];

// 1. Create a new array containing only movie titles
const movieNames = movies.map(film => film.title);
console.log(movieNames);

// 2. Create a new array containing only movie ratings
const starRatings = movies.map(film => film.rating);
console.log(starRatings);

// 3. Increase every movie rating by 1
const updatedRatings = movies.map(film => ({
  ...film,
  rating: film.rating + 1
}));
console.log(updatedRatings);

// 4. Get all movies with rating greater than 8
const topRated = movies.filter(film => film.rating > 8);
console.log(topRated);

// 5. Get all movies with rating less than 9
const averageRated = movies.filter(film => film.rating < 9);
console.log(averageRated);

// 6. Find the movie with ID 3
const selectedMovie = movies.find(film => film.id === 3);
console.log(selectedMovie);

// 7. Find the movie with title "Pushpa"
const pushpaMovie = movies.find(film => film.title === "Pushpa");
console.log(pushpaMovie);

// 8. Calculate the total of all movie ratings
const ratingTotal = movies.reduce((total, film) => total + film.rating, 0);
console.log(ratingTotal);

// Task 2: Products
const products = [
  { id: 1, name: "Laptop", price: 50000 },
  { id: 2, name: "Mouse", price: 500 },
  { id: 3, name: "Keyboard", price: 1500 },
  { id: 4, name: "Monitor", price: 12000 }
];

// 9. Product names
const names = products.map(product => product.name);
console.log(names);

// 10. Product prices
const prices = products.map(product => product.price);
console.log(prices);

// 11. Increase every product price by ₹1000
const increased = products.map(product => ({
  ...product,
  price: product.price + 1000
}));
console.log(increased);

// 12. Products costing more than ₹1000
const costly = products.filter(product => product.price > 1000);
console.log(costly);

// 13. Products costing less than ₹10000
const cheap = products.filter(product => product.price < 10000);
console.log(cheap);

// 14. Product with ID 2
const item = products.find(product => product.id === 2);
console.log(item);

// 15. Product named "Monitor"
const monitor = products.find(product => product.name === "Monitor");
console.log(monitor);

// 16. Total cost of all products
const total = products.reduce((sum, product) => sum + product.price, 0);
console.log(total);

// Task 3 : Cricket Scores
const scores = [45, 80, 20, 100, 60];

// 17. Add 10 runs to every score
const plusTen = scores.map(score => score + 10);
console.log(plusTen);

// 18. Add 5 runs to every score
const plusFive = scores.map(score => score + 5);
console.log(plusFive);

// 19. Get all scores greater than 50
const aboveFifty = scores.filter(score => score > 50);
console.log(aboveFifty);

// 20. Get all scores greater than or equal to 80
const eightyOrMore = scores.filter(score => score >= 80);
console.log(eightyOrMore);

// 21. Find the first score greater than 70
const firstHigh = scores.find(score => score > 70);
console.log(firstHigh);

// 22. Find the first score equal to 100
const century = scores.find(score => score === 100);
console.log(century);

// 23. Calculate the total runs scored
const runs = scores.reduce((sum, score) => sum + score, 0);
console.log(runs);

// 24. Calculate the average score
const average = scores.reduce((sum, score) => sum + score, 0) / scores.length;
console.log(average);

// Task 4: Students
const students = [
  { name: "Ravi", marks: 90 },
  { name: "Priya", marks: 75 },
  { name: "Rahul", marks: 40 },
  { name: "Anu", marks: 95 }
];

// 25. Create an array containing only student names
const studentNames = students.map(student => student.name);
console.log(studentNames);

// 26. Create an array containing only student marks
const studentMarks = students.map(student => student.marks);
console.log(studentMarks);

// 27. Add 5 marks to every student
const bonusMarks = students.map(student => ({
  ...student,
  marks: student.marks + 5
}));
console.log(bonusMarks);

// 28. Get students who scored above 80
const toppers = students.filter(student => student.marks > 80);
console.log(toppers);

// 29. Get students who scored below 50
const failedStudents = students.filter(student => student.marks < 50);
console.log(failedStudents);

// 30. Find the student named "Rahul"
const rahulDetails = students.find(student => student.name === "Rahul");
console.log(rahulDetails);

// 31. Find the first student who scored above 90
const highestScorer = students.find(student => student.marks > 90);
console.log(highestScorer);

// 32. Calculate the total marks of all students
const totalMarks = students.reduce((sum, student) => sum + student.marks, 0);
console.log(totalMarks);

// Task 5 : Food Orders
const foodOrders = [
  { item: "Pizza", price: 300 },
  { item: "Burger", price: 150 },
  { item: "Biryani", price: 250 },
  { item: "Ice Cream", price: 100 }
];

// 33. Create an array containing only food item names
const menuItems = foodOrders.map(order => order.item);
console.log(menuItems);

// 34. Create an array containing only food prices
const foodCosts = foodOrders.map(order => order.price);
console.log(foodCosts);

// 35. Increase every food price by ₹50
const revisedPrices = foodOrders.map(order => ({
  ...order,
  price: order.price + 50
}));
console.log(revisedPrices);

// 36. Get all food items costing more than ₹200
const premiumFoods = foodOrders.filter(order => order.price > 200);
console.log(premiumFoods);

// 37. Get all food items costing less than ₹250
const budgetFoods = foodOrders.filter(order => order.price < 250);
console.log(budgetFoods);

// 38. Find the food item "Biryani"
const biryaniOrder = foodOrders.find(order => order.item === "Biryani");
console.log(biryaniOrder);

// 39. Find the first food item costing more than ₹250
const expensiveFood = foodOrders.find(order => order.price > 250);
console.log(expensiveFood);

// 40. Calculate the total food bill
const billAmount = foodOrders.reduce((sum, order) => sum + order.price, 0);
console.log(billAmount);

// Bonus :

// 41. Create an array of movie titles in uppercase
const upperTitles = movies.map(movie => movie.title.toUpperCase());
console.log(upperTitles);

// 42. Create an array of product names in lowercase
const lowerProducts = products.map(product => product.name.toLowerCase());
console.log(lowerProducts);

// 43. Get all students whose names start with "R"
const rStudents = students.filter(student => student.name.startsWith("R"));
console.log(rStudents);

// 44. Get all movies whose title length is greater than 5
const longMovies = movies.filter(movie => movie.title.length > 5);
console.log(longMovies);

// 45. Calculate the combined total of all cricket scores and all student marks
const grandTotal =
  scores.reduce((sum, score) => sum + score, 0) +
  students.reduce((sum, student) => sum + student.marks, 0);

console.log(grandTotal);

// 46. Find the most expensive product
const costlyProduct = products.reduce((max, product) =>
  product.price > max.price ? product : max
);

console.log(costlyProduct);

// 47. Find the highest cricket score
const topScore = scores.reduce((max, score) =>
  score > max ? score : max
);

console.log(topScore);

// 48. Find the student with the highest marks
const maxMarks = Math.max(...students.map(person => person.marks));
const bestStudent = students.find(person => person.marks === maxMarks);
console.log(bestStudent);

// 49. Find the movie with the highest rating
const bestMovie = movies.reduce((top, movie) =>
  movie.rating > top.rating ? movie : top
);

console.log(bestMovie);

// 50. Create your own dataset and write 5 custom operations on it

const employees = [
  { id: 1, name: "Raj", salary: 40000 },
  { id: 2, name: "Kiran", salary: 55000 },
  { id: 3, name: "Arun", salary: 30000 },
  { id: 4, name: "Sekhar", salary: 60000 }
];

// Get employee names
const empNames = employees.map(emp => emp.name);
console.log(empNames);

// Increase salary by 5000
const hike = employees.map(emp => ({
  ...emp,
  salary: emp.salary + 5000
}));
console.log(hike);

// Employees with salary above 50000
const highSalary = employees.filter(emp => emp.salary > 50000);
console.log(highSalary);

// Find employee named Arun
const Emp = employees.find(emp => emp.name === "Arun");
console.log(Emp);

// Total salary
const salaryTotal = employees.reduce((sum, emp) => sum + emp.salary, 0);
console.log(salaryTotal);
    </script>
</body>
</html>
