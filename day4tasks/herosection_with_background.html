<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', Arial, sans-serif;
}

/* Hero Section */
.hero {
  height: 100vh;

  /* Overlay + Image */
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://picsum.photos/1200/800");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: white;
  text-align: center;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* Content */
.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 20px;
}

.hero button {
  padding: 10px 20px;
  border: none;
  background: orange;
  color: white;
  border-radius: 5px;
}
</style>

</head>
<body>

<div class="hero">
  <div>
        <h1>Welcome to My Website</h1>
        <p>Build modern, responsive and beautiful web applications using HTML and CSS.</p>
        <button>Get Started</button>
  </div>
</div>

</body>
</html>
