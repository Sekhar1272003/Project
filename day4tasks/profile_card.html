<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', Arial, sans-serif;
  background: #f4f4f4;
}

/* Card */
.card {
  width: 300px;
  margin: 50px auto; /* outside spacing */
  padding: 20px;     /* inside spacing */
  background: rgb(96, 156, 196);
  border: 1px solid #ccc;
  border-radius: 10px;
  text-align: center;
}

/* Text */
.card h2 {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}

.card p {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Button */
.card button {
  padding: 10px 20px;
  border: none;
  background: blue;
  color: white;
  border-radius: 5px;
}
</style>

</head>
<body>

<div class="card">
  <h2>Raj Sekhar</h2>
  <p>Web developer passionate about building modern web interfaces.</p>
  <button>Click Me</button>
</div>

</body>
</html>
