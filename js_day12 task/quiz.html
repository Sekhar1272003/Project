<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Quiz App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="screen active">
    <h1>JavaScript Quiz</h1>
    <p>Test your JavaScript knowledge with this fun quiz! Answer all the questions and see your final score.</p>
    <p class="total-q">Total Questions: <span id="total-questions-display">10</span></p>
    <button id="start-btn">Start Quiz</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <span id="progress-text">Question 1 of 10</span>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </div>

    <h2 id="question-text">Question text goes here</h2>

    <div id="options-container"></div>

    <div class="quiz-footer">
      <button id="prev-btn">Previous</button>
      <button id="next-btn">Next</button>
      <button id="submit-btn">Submit Quiz</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="screen">
    <h1>Quiz Completed!</h1>
    <p id="performance-message" class="performance-message"></p>

    <div class="result-stats">
      <div class="stat-box">
        <span class="stat-label">Total Questions</span>
        <span id="result-total" class="stat-value">0</span>
      </div>
      <div class="stat-box correct">
        <span class="stat-label">Correct Answers</span>
        <span id="result-correct" class="stat-value">0</span>
      </div>
      <div class="stat-box wrong">
        <span class="stat-label">Wrong Answers</span>
        <span id="result-wrong" class="stat-value">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Percentage</span>
        <span id="result-percentage" class="stat-value">0%</span>
      </div>
    </div>

    <button id="restart-btn">Restart Quiz</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
